name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntaxe modules ES + graphe app-init + ESLint
        run: npm run ci

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Playwright Chromium
        run: npx playwright install --with-deps chromium || echo "Playwright browser download unavailable in this environment"
        continue-on-error: true

      - name: Tests smoke E2E
        run: npm run test:e2e
        env:
          CI: true
        continue-on-error: true

      - name: Note on E2E tests
        if: always()
        run: echo "E2E tests require network access to Playwright CDN. Run locally with 'npm run test:e2e' before deployment."
