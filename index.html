<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maths Magiques — CP, CE1 &amp; CE2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="mascotte" id="mascotte-header" aria-hidden="true"></div>
      <div class="titre-bloc">
        <h1>Maths magiques</h1>
        <p class="sous-titre" id="sous-titre">Des jeux pour devenir champion·ne !</p>
      </div>
      <div class="header-droite">
        <div class="streak-header" id="streak-header"></div>
        <div class="score-global" title="Étoiles gagnées">
          <span class="score-icone">⭐</span>
          <span id="total-etoiles">0</span>
        </div>
      </div>
    </header>

    <section id="ecran-nommage" class="ecran" hidden aria-label="Bienvenue !">
      <div class="nommage-conteneur">
        <div class="nommage-fox" id="nommage-fox" aria-hidden="true"></div>
        <h2 class="nommage-titre">Comment s'appelle<br>ton renard ?</h2>
        <form class="nommage-form" id="nommage-form" autocomplete="off">
          <input type="text" id="input-nom-renard" class="input-nom"
                 maxlength="12" placeholder="Ex : Foxy"
                 aria-label="Nom du renard"/>
          <button type="submit" class="btn-nommage">C'est parti ! 🎉</button>
        </form>
        <p class="nommage-hint">Maximum 12 lettres</p>
      </div>
    </section>

    <section id="ecran-genre" class="ecran actif" aria-label="Qui joue ?">
      <div class="genre-conteneur">
        <div class="genre-mascotte" id="mascotte-genre" aria-hidden="true"></div>
        <div class="genre-btns">
          <button type="button" class="btn-genre" id="btn-fille" data-genre="fille" aria-label="Fille">
            <span class="genre-emoji">👧</span>
          </button>
          <button type="button" class="btn-genre" id="btn-garcon" data-genre="garcon" aria-label="Garçon">
            <span class="genre-emoji">👦</span>
          </button>
        </div>
      </div>
    </section>

    <main id="ecran-menu" class="ecran" hidden>

      <!-- ── Carte Ma Maison ─── toujours visible en haut ────── -->
      <button type="button" class="maison-banner" id="btn-maison" aria-label="Ma Maison">
        <div class="maison-banner-fox" id="maison-banner-fox" aria-hidden="true"></div>
        <div class="maison-banner-infos">
          <span class="maison-banner-nom" id="maison-banner-nom"></span>
          <span class="maison-banner-sub" id="maison-banner-sub"></span>
        </div>
        <div class="maison-banner-droite">
          <span class="maison-banner-stars" id="maison-banner-stars"></span>
          <span class="maison-banner-fleche" aria-hidden="true">›</span>
        </div>
      </button>

      <!-- ── Sélecteur de niveau ──────────────────────────────── -->
      <div class="niveau-barre" role="group" aria-label="Niveau de difficulté">
        <div class="niveau-switch">
          <button type="button" class="niveau-btn actif" id="niveau-cp" data-niveau="cp">🌱 CP</button>
          <button type="button" class="niveau-btn" id="niveau-ce1" data-niveau="ce1">🚀 CE1</button>
          <button type="button" class="niveau-btn" id="niveau-ce2" data-niveau="ce2">⭐ CE2</button>
        </div>
      </div>

      <p class="accueil">Choisis ton jeu !</p>

      <!-- ── Grille des jeux ─────────────────────────────────── -->
      <div class="grille-jeux">
        <button type="button" class="carte-jeu" data-jeu="compte"        data-cat="maths">  <span class="emoji-jeu">🐱</span><span class="nom-jeu">Compte-moi ça !</span><span class="desc-jeu">Combien d'animaux ?</span></button>
        <button type="button" class="carte-jeu" data-jeu="addition"      data-cat="maths">  <span class="emoji-jeu">🎈</span><span class="nom-jeu">Addition magique</span><span class="desc-jeu" id="desc-addition">Jusqu'à 10</span></button>
        <button type="button" class="carte-jeu" data-jeu="soustraction"  data-cat="maths">  <span class="emoji-jeu">🍎</span><span class="nom-jeu">Les pommes</span><span class="desc-jeu">On enlève, combien reste-t-il ?</span></button>
        <button type="button" class="carte-jeu" data-jeu="compare"       data-cat="maths">  <span class="emoji-jeu">⚖️</span><span class="nom-jeu">Le plus grand</span><span class="desc-jeu">Qui gagne ?</span></button>
        <button type="button" class="carte-jeu" data-jeu="suite"         data-cat="maths">  <span class="emoji-jeu">🔢</span><span class="nom-jeu">Numéro manquant</span><span class="desc-jeu">Trouve le chiffre caché</span></button>
        <button type="button" class="carte-jeu" data-jeu="doubles"       data-cat="maths">  <span class="emoji-jeu">👯</span><span class="nom-jeu">Doubles</span><span class="desc-jeu">2+2, 3+3…</span></button>
        <button type="button" class="carte-jeu" data-jeu="moitie"        data-cat="maths">  <span class="emoji-jeu">✂️</span><span class="nom-jeu">La moitié</span><span class="desc-jeu">Partage en 2 parts égales</span></button>
        <button type="button" class="carte-jeu" data-jeu="dizaines"      data-cat="maths">  <span class="emoji-jeu">📊</span><span class="nom-jeu">Dizaines &amp; Unités</span><span class="desc-jeu">Barres et points</span></button>
        <button type="button" class="carte-jeu" data-jeu="pairimpair"    data-cat="formes"> <span class="emoji-jeu">🟣</span><span class="nom-jeu">Pair ou Impair ?</span><span class="desc-jeu">Range les objets en 2</span></button>
        <button type="button" class="carte-jeu" data-jeu="formes"        data-cat="formes"> <span class="emoji-jeu">🔷</span><span class="nom-jeu">Les formes</span><span class="desc-jeu">Cercle, carré, triangle…</span></button>
        <button type="button" class="carte-jeu" data-jeu="fractions"     data-cat="formes"> <span class="emoji-jeu">🍕</span><span class="nom-jeu">Fractions</span><span class="desc-jeu">½ ¼ ¾ de formes</span></button>
        <button type="button" class="carte-jeu" data-jeu="symetrie"      data-cat="formes"> <span class="emoji-jeu">🪞</span><span class="nom-jeu">Symétrie</span><span class="desc-jeu">Trouve le miroir</span></button>
        <button type="button" class="carte-jeu" data-jeu="perimetre"     data-cat="formes"> <span class="emoji-jeu">🔲</span><span class="nom-jeu">Périmètre</span><span class="desc-jeu">Tour de la figure</span></button>
        <button type="button" class="carte-jeu" data-jeu="angles"        data-cat="formes"> <span class="emoji-jeu">📐</span><span class="nom-jeu">Les angles</span><span class="desc-jeu">Droit, aigu, obtus</span></button>
        <button type="button" class="carte-jeu" data-jeu="heure"         data-cat="temps">  <span class="emoji-jeu">🕐</span><span class="nom-jeu">L'heure</span><span class="desc-jeu">Lis l'horloge !</span></button>
        <button type="button" class="carte-jeu" data-jeu="durees"        data-cat="temps">  <span class="emoji-jeu">⏱️</span><span class="nom-jeu">Durées</span><span class="desc-jeu">Calcule l'heure de fin</span></button>
        <button type="button" class="carte-jeu" data-jeu="mesures"       data-cat="temps">  <span class="emoji-jeu">📏</span><span class="nom-jeu">Mesures</span><span class="desc-jeu">Longueurs et masses</span></button>
        <button type="button" class="carte-jeu" data-jeu="masse"         data-cat="temps">  <span class="emoji-jeu">⚖️</span><span class="nom-jeu">La masse</span><span class="desc-jeu">Poids et pesées</span></button>
        <button type="button" class="carte-jeu" data-jeu="monnaiecp"     data-cat="argent"> <span class="emoji-jeu">🪙</span><span class="nom-jeu">La monnaie</span><span class="desc-jeu">Pièces et petites sommes</span></button>
        <button type="button" class="carte-jeu" data-jeu="monnaiece1"    data-cat="argent"> <span class="emoji-jeu">💶</span><span class="nom-jeu">Monnaie CE1</span><span class="desc-jeu">Totaux &amp; rendu</span></button>
        <button type="button" class="carte-jeu" data-jeu="multiplication" data-cat="avance"><span class="emoji-jeu">✖️</span><span class="nom-jeu">Tables ×</span><span class="desc-jeu">×2 ×3 ×4 ×5 ×10</span></button>
        <button type="button" class="carte-jeu" data-jeu="division"      data-cat="avance"> <span class="emoji-jeu">➗</span><span class="nom-jeu">Partage</span><span class="desc-jeu">En groupes égaux</span></button>
        <button type="button" class="carte-jeu" data-jeu="probleme"      data-cat="avance"> <span class="emoji-jeu">📖</span><span class="nom-jeu">Problème du jour</span><span class="desc-jeu">Résous le problème</span></button>
        <button type="button" class="carte-jeu" data-jeu="syllabes"      data-cat="langage"><span class="emoji-jeu">📖</span><span class="nom-jeu">Syllabes</span><span class="desc-jeu">Complète le mot !</span></button>
        <button type="button" class="carte-jeu" data-jeu="lecture"       data-cat="langage"><span class="emoji-jeu">📚</span><span class="nom-jeu">Lecture</span><span class="desc-jeu">Image et mot qui va avec</span></button>
        <button type="button" class="carte-jeu" data-jeu="anglais"       data-cat="langage"><span class="emoji-jeu">🇬🇧</span><span class="nom-jeu">English</span><span class="desc-jeu">What is this?</span></button>
        <button type="button" class="carte-jeu" data-jeu="traduction"    data-cat="langage"><span class="emoji-jeu">🔤</span><span class="nom-jeu">Traduction</span><span class="desc-jeu">Français → Anglais</span></button>
      </div>

      <button type="button" class="btn-changer-genre" id="btn-changer-genre" aria-label="Changer de profil">
        <span id="icone-genre-actuel">👧</span>
      </button>
    </main>

    <section id="ecran-maison" class="ecran" hidden aria-label="Ma Maison">
      <button type="button" class="btn-retour" id="btn-retour-maison">← Menu</button>
      <h2 class="maison-titre">🏠 Ma Maison</h2>
      <div class="maison-conteneur">
        <div class="maison-renard" id="maison-renard" aria-hidden="true"></div>
        <div class="maison-infos">
          <p class="maison-nom" id="maison-nom"></p>
          <p class="maison-stade" id="maison-stade"></p>
          <p class="maison-jours" id="maison-jours"></p>
        </div>
        <div class="maison-etoiles">
          <span class="maison-etoiles-icone">⭐</span>
          <span class="maison-etoiles-total" id="maison-etoiles-total"></span>
        </div>
        <div class="maison-progression">
          <p class="maison-prog-label" id="maison-prog-label"></p>
          <div class="maison-barre-fond">
            <div class="maison-barre-remplie" id="maison-barre-remplie"></div>
          </div>
        </div>
        <div class="maison-jauges">
          <div class="jauge-ligne">
            <span class="jauge-label">🍎 Faim</span>
            <div class="jauge-barre-fond">
              <div class="jauge-barre-fill jauge-faim" id="jauge-faim-barre"></div>
            </div>
            <span class="jauge-val" id="jauge-faim-val"></span>
          </div>
          <div class="jauge-ligne">
            <span class="jauge-label">❤️ Bonheur</span>
            <div class="jauge-barre-fond">
              <div class="jauge-barre-fill jauge-bonheur" id="jauge-bonheur-barre"></div>
            </div>
            <span class="jauge-val" id="jauge-bonheur-val"></span>
          </div>
        </div>
        <div class="maison-actions">
          <button type="button" class="btn-action-renard" id="btn-nourrir">
            🍎 Nourrir<br><small>−2 ⭐</small>
          </button>
          <button type="button" class="btn-action-renard" id="btn-calin">
            ❤️ Câlin<br><small id="calin-dispo-label">1× par jour</small>
          </button>
        </div>
        <button type="button" class="btn-dressing" id="btn-dressing">👗 Dressing</button>
      </div>
    </section>

    <section id="ecran-dressing" class="ecran" hidden aria-label="Dressing">
      <button type="button" class="btn-retour" id="btn-retour-dressing">← Maison</button>
      <h2 class="dressing-titre">👗 Le Dressing</h2>
      <p class="dressing-sous-titre" id="dressing-sous-titre"></p>
      <div class="dressing-preview" id="dressing-preview"></div>
      <div class="dressing-grille" id="dressing-grille"></div>
    </section>

    <section id="ecran-jeu" class="ecran" hidden>
      <button type="button" class="btn-retour" id="btn-retour">← Menu</button>
      <p class="jeu-niveau" id="jeu-niveau-badge" hidden></p>
      <h2 id="jeu-titre" class="jeu-titre"></h2>
      <div id="zone-question" class="zone-question"></div>
      <div id="zone-choix" class="zone-choix"></div>
      <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      <button type="button" class="btn-suivant" id="btn-suivant" hidden>Question suivante →</button>
    </section>

    <div id="renard-reaction" class="renard-reaction" aria-hidden="true" hidden></div>
    <div id="confetti" class="confetti" aria-hidden="true"></div>
  </div>
  <script type="module" src="app-init.js"></script>
</body>
</html>
