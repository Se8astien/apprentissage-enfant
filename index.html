<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maths Magiques — CP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
:root {
  --fond: linear-gradient(145deg, #e8f4ff 0%, #fff5e6 45%, #ffe8f0 100%);
  --carte: #ffffff;
  --primaire: #6c5ce7;
  --primaire-fonce: #5344c7;
  --accent: #00cec9;
  --soleil: #fdcb6e;
  --rose: #fd79a8;
  --succes: #00b894;
  --erreur: #e17055;
  --texte: #2d3436;
  --ombre: rgba(45, 52, 54, 0.12);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  font-size: clamp(15px, 2.8vw, 20px);
}

body {
  margin: 0;
  min-height: 100dvh;
  font-family: "Fredoka", "Segoe UI", system-ui, sans-serif;
  color: var(--texte);
  background: var(--fond);
  background-attachment: fixed;
  -webkit-tap-highlight-color: transparent;
}

.app {
  max-width: 32rem;
  margin: 0 auto;
  padding: 1rem 1rem 2rem;
  min-height: 100dvh;
  position: relative;
}

.top {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}

.mascotte {
  font-size: 2.75rem;
  line-height: 1;
  animation: flotte 2.5s ease-in-out infinite;
}

@keyframes flotte {
  0%,
  100% {
    transform: translateY(0) rotate(-5deg);
  }
  50% {
    transform: translateY(-6px) rotate(5deg);
  }
}

.titre-bloc {
  flex: 1;
}

h1 {
  margin: 0;
  font-size: 1.45rem;
  font-weight: 700;
  color: var(--primaire);
  letter-spacing: -0.02em;
}

.sous-titre {
  margin: 0.15rem 0 0;
  font-size: 0.8rem;
  opacity: 0.85;
}

.score-global {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  background: var(--carte);
  padding: 0.4rem 0.65rem;
  border-radius: 999px;
  font-weight: 700;
  font-size: 1.1rem;
  box-shadow: 0 4px 14px var(--ombre);
}

.score-icone {
  font-size: 1.2rem;
}

.ecran {
  display: none;
}

.ecran.actif {
  display: block;
  animation: entree 0.35s ease-out;
}

@keyframes entree {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.niveau-barre {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.niveau-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--primaire-fonce);
  opacity: 0.85;
}

.niveau-switch {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  background: var(--carte);
  padding: 0.35rem;
  border-radius: 999px;
  box-shadow: 0 4px 16px var(--ombre);
}

.niveau-btn {
  flex: 1;
  min-width: 6rem;
  border: none;
  border-radius: 999px;
  padding: 0.55rem 0.65rem;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--texte);
  opacity: 0.75;
  transition: background 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
}

.niveau-btn:hover,
.niveau-btn:focus-visible {
  opacity: 1;
  outline: none;
  box-shadow: 0 0 0 2px var(--accent);
}

.niveau-btn.actif {
  background: linear-gradient(135deg, var(--primaire), #a29bfe);
  color: #fff;
  opacity: 1;
  box-shadow: 0 2px 10px rgba(108, 92, 231, 0.35);
}

.accueil {
  text-align: center;
  font-size: 1rem;
  margin: 0 0 1rem;
}

.grille-jeux {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

.carte-jeu {
  border: none;
  border-radius: 1.1rem;
  padding: 1rem 0.75rem;
  background: var(--carte);
  box-shadow: 0 6px 20px var(--ombre);
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
}

.carte-jeu:active {
  transform: scale(0.97);
}

.carte-jeu:hover,
.carte-jeu:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(108, 92, 231, 0.2);
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}

.emoji-jeu {
  font-size: 2rem;
  line-height: 1;
}

.nom-jeu {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--primaire);
}

.desc-jeu {
  font-size: 0.72rem;
  opacity: 0.8;
  line-height: 1.25;
}

.btn-retour {
  border: none;
  background: transparent;
  color: var(--primaire);
  font-family: inherit;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  padding: 0.4rem 0;
  margin-bottom: 0.5rem;
}

.btn-retour:hover,
.btn-retour:focus-visible {
  text-decoration: underline;
  outline: none;
}

.jeu-niveau {
  text-align: center;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--primaire-fonce);
  opacity: 0.9;
  margin: 0 0 0.35rem;
}

.jeu-titre {
  text-align: center;
  font-size: 1.15rem;
  margin: 0 0 1rem;
  color: var(--primaire-fonce);
}

.zone-question {
  background: var(--carte);
  border-radius: 1.25rem;
  padding: 1.25rem;
  margin-bottom: 1rem;
  box-shadow: 0 6px 24px var(--ombre);
  min-height: 5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 1.05rem;
  line-height: 1.5;
}

.zone-question .ligne-emojis {
  font-size: clamp(1.6rem, 8vw, 2.4rem);
  letter-spacing: 0.15em;
  line-height: 1.6;
  word-break: break-all;
}

.zone-question .ligne-emojis.petit {
  font-size: clamp(1.2rem, 5vw, 1.7rem);
  letter-spacing: 0.08em;
}

.zone-question .equation {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--primaire);
  margin-top: 0.5rem;
}

.zone-question .suite {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
}

.zone-choix {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.65rem;
}

.btn-choix {
  border: none;
  border-radius: 1rem;
  padding: 1rem;
  font-family: inherit;
  font-size: 1.35rem;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(180deg, #fff 0%, #f0f0ff 100%);
  color: var(--primaire);
  box-shadow: 0 4px 0 var(--primaire-fonce), 0 8px 20px var(--ombre);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

.btn-choix:active:not(:disabled) {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--primaire-fonce), 0 4px 12px var(--ombre);
}

.btn-choix:disabled {
  cursor: default;
  opacity: 0.85;
}

.btn-choix.bonne {
  background: linear-gradient(180deg, #d4fc79 0%, var(--succes) 100%);
  color: #fff;
  box-shadow: 0 4px 0 #006b57, 0 8px 20px rgba(0, 184, 148, 0.35);
}

.btn-choix.mauvaise {
  background: linear-gradient(180deg, #fab1a0 0%, var(--erreur) 100%);
  color: #fff;
  box-shadow: 0 4px 0 #b3391b, 0 8px 20px rgba(225, 112, 85, 0.35);
}

.feedback {
  min-height: 2.5rem;
  text-align: center;
  font-weight: 600;
  font-size: 1rem;
  margin: 1rem 0 0.5rem;
}

.feedback.ok {
  color: var(--succes);
}

.feedback.non {
  color: var(--erreur);
}

.btn-suivant {
  display: block;
  width: 100%;
  margin-top: 0.5rem;
  border: none;
  border-radius: 999px;
  padding: 0.85rem 1rem;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(90deg, var(--accent), var(--primaire));
  color: #fff;
  box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
}

.btn-suivant:hover,
.btn-suivant:focus-visible {
  filter: brightness(1.05);
  outline: 3px solid var(--soleil);
  outline-offset: 2px;
}

.confetti {
  pointer-events: none;
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 100;
}

.confetti span {
  position: absolute;
  top: -10%;
  animation: tomber 2.2s ease-out forwards;
  font-size: 1.25rem;
}

@keyframes tomber {
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0.6;
  }
}

@media (min-width: 480px) {
  .grille-jeux {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ── Écran sélection du genre ────────────────────────────────────────────── */

#ecran-genre {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70dvh;
}

#ecran-genre.actif {
  display: flex;
}

.genre-conteneur {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
  padding: 1rem;
}

.genre-mascotte {
  font-size: 3.5rem;
  animation: flotte 2.5s ease-in-out infinite;
}

.genre-btns {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
}

.btn-genre {
  border: none;
  border-radius: 1.5rem;
  padding: 1.25rem 1rem;
  background: var(--carte);
  box-shadow: 0 8px 28px var(--ombre);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  min-width: 7rem;
}

.btn-genre:hover,
.btn-genre:focus-visible {
  transform: translateY(-4px) scale(1.04);
  box-shadow: 0 14px 36px rgba(108, 92, 231, 0.22);
  outline: 3px solid var(--accent);
  outline-offset: 3px;
}

.btn-genre:active {
  transform: scale(0.96);
}

.genre-emoji {
  font-size: clamp(3.5rem, 14vw, 5rem);
  line-height: 1;
  display: block;
  animation: flotte 3s ease-in-out infinite;
}

#btn-fille .genre-emoji  { animation-delay: 0s; }
#btn-garcon .genre-emoji { animation-delay: 0.4s; }

@keyframes genre-entree {
  from {
    opacity: 0;
    transform: scale(0.7) translateY(16px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

#btn-fille  { animation: genre-entree 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
#btn-garcon { animation: genre-entree 0.4s 0.12s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

/* Bouton discret "changer de profil" dans le menu */
.btn-changer-genre {
  display: block;
  margin: 1.5rem auto 0;
  border: none;
  background: transparent;
  font-size: 1.6rem;
  cursor: pointer;
  opacity: 0.45;
  transition: opacity 0.15s ease, transform 0.15s ease;
  padding: 0.3rem;
  border-radius: 999px;
}

.btn-changer-genre:hover,
.btn-changer-genre:focus-visible {
  opacity: 1;
  transform: scale(1.15);
  outline: 2px solid var(--accent);
}

/* ── Boutons visuels generiques ─────────────────────────────────────────── */

.btn-forme {
  padding: 0.35rem;
  line-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-visuel2 {
  padding: 0.75rem;
  line-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Pair / Impair ──────────────────────────────────────────────────────── */

.pair-question {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
}

.pair-nombre {
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--primaire);
  line-height: 1;
}

/* ── Dizaines & Unités ──────────────────────────────────────────────────── */

.diz-question {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: auto;
  max-width: 100%;
}

/* ── Formes ─────────────────────────────────────────────────────────────── */

.forme-question {
  display: flex;
  align-items: center;
  justify-content: center;
  animation: apparition-horloge 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── Moitié ─────────────────────────────────────────────────────────────── */

.moitie-question {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  width: 100%;
}

.moitie-row {
  font-size: clamp(1.1rem, 5vw, 1.6rem);
  letter-spacing: 0.1em;
  line-height: 1.5;
}

.moitie-cache {
  opacity: 0.5;
}

.moitie-sep {
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  color: var(--primaire);
  opacity: 0.6;
}

/* ── Multiplication ─────────────────────────────────────────────────────── */

.mult-grille {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  align-items: center;
  max-width: 100%;
}

.mult-groupe {
  background: #f0eeff;
  border: 2px solid #c4b5f9;
  border-radius: 0.75rem;
  padding: 0.35rem 0.5rem;
  font-size: clamp(1rem, 4vw, 1.4rem);
  letter-spacing: 0.05em;
  line-height: 1.4;
}

.mult-grille-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
}

.mult-dots {
  background: #f0eeff;
  border: 2px solid #c4b5f9;
  border-radius: 0.6rem;
  padding: 4px;
}

/* ── Division ────────────────────────────────────────────────────────────── */

.div-question {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  width: 100%;
}

.div-total {
  font-size: clamp(0.9rem, 3.5vw, 1.2rem);
  letter-spacing: 0.08em;
  line-height: 1.5;
}

.div-arrow {
  font-size: 1.2rem;
  color: var(--primaire);
  opacity: 0.7;
}

.div-groupes {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
}

.div-groupe {
  min-width: 2.5rem;
  min-height: 2.5rem;
  background: #f0eeff;
  border: 2px dashed #c4b5f9;
  border-radius: 0.75rem;
  padding: 0.3rem 0.5rem;
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.05em;
}

/* ── Fractions ───────────────────────────────────────────────────────────── */

.fraction-question {
  display: flex;
  align-items: center;
  justify-content: center;
  animation: apparition-horloge 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── Monnaie ─────────────────────────────────────────────────────────────── */

.monnaie-question {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  font-size: 1.4rem;
}

.monnaie-ligne strong {
  color: var(--primaire);
}

.monnaie-interro {
  font-size: 2rem;
}

/* ── Symétrie ────────────────────────────────────────────────────────────── */

.symetrie-question {
  display: flex;
  align-items: center;
  justify-content: center;
  animation: apparition-horloge 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── Jeu : L'heure ──────────────────────────────────────────────────────── */

.grande-horloge {
  display: flex;
  align-items: center;
  justify-content: center;
  animation: apparition-horloge 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes apparition-horloge {
  0% {
    transform: scale(0.65) rotate(-10deg);
    opacity: 0;
  }
  65% {
    transform: scale(1.06) rotate(3deg);
    opacity: 1;
  }
  100% {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }
}

.btn-horloge {
  padding: 0.45rem;
  line-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes horloge-bonne {
  0%, 100% {
    transform: rotate(0deg) scale(1);
  }
  25% {
    transform: rotate(-9deg) scale(1.07);
  }
  75% {
    transform: rotate(9deg) scale(1.07);
  }
}

.btn-horloge.bonne {
  animation: horloge-bonne 0.45s ease-in-out;
}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="mascotte" aria-hidden="true">🦊</div>
      <div class="titre-bloc">
        <h1>Maths magiques</h1>
        <p class="sous-titre" id="sous-titre">Des jeux pour devenir championne en maths !</p>
      </div>
      <div class="score-global" title="Étoiles gagnées">
        <span class="score-icone">⭐</span>
        <span id="total-etoiles">0</span>
      </div>
    </header>

    <section id="ecran-genre" class="ecran actif" aria-label="Qui joue ?">
      <div class="genre-conteneur">
        <div class="genre-mascotte" aria-hidden="true">🦊</div>
        <div class="genre-btns">
          <button type="button" class="btn-genre" id="btn-fille" data-genre="fille" aria-label="Fille">
            <span class="genre-emoji">👧</span>
          </button>
          <button type="button" class="btn-genre" id="btn-garcon" data-genre="garcon" aria-label="Garçon">
            <span class="genre-emoji">👦</span>
          </button>
        </div>
      </div>
    </section>

    <main id="ecran-menu" class="ecran" hidden>
      <div class="niveau-barre" role="group" aria-label="Niveau de difficulté">
        <span class="niveau-label">Niveau</span>
        <div class="niveau-switch">
          <button type="button" class="niveau-btn actif" id="niveau-cp" data-niveau="cp">CP</button>
          <button type="button" class="niveau-btn" id="niveau-ce1" data-niveau="ce1">CE1</button>
        </div>
      </div>
      <p class="accueil">Choisis un jeu, c'est parti !</p>
      <div class="grille-jeux">
        <button type="button" class="carte-jeu" data-jeu="compte"><span class="emoji-jeu">🐱</span><span class="nom-jeu">Compte-moi ça !</span><span class="desc-jeu">Combien d'animaux ?</span></button>
        <button type="button" class="carte-jeu" data-jeu="addition"><span class="emoji-jeu">🎈</span><span class="nom-jeu">Addition magique</span><span class="desc-jeu" id="desc-addition">Jusqu'à 10</span></button>
        <button type="button" class="carte-jeu" data-jeu="soustraction"><span class="emoji-jeu">🍎</span><span class="nom-jeu">Les pommes</span><span class="desc-jeu">On enlève, combien il reste ?</span></button>
        <button type="button" class="carte-jeu" data-jeu="compare"><span class="emoji-jeu">⚖️</span><span class="nom-jeu">Le plus grand</span><span class="desc-jeu">Qui gagne ?</span></button>
        <button type="button" class="carte-jeu" data-jeu="suite"><span class="emoji-jeu">🔢</span><span class="nom-jeu">Numéro manquant</span><span class="desc-jeu">Trouve le chiffre caché</span></button>
        <button type="button" class="carte-jeu" data-jeu="doubles"><span class="emoji-jeu">👯</span><span class="nom-jeu">Doubles</span><span class="desc-jeu">2 + 2, 3 + 3…</span></button>
        <button type="button" class="carte-jeu" data-jeu="heure"><span class="emoji-jeu">🕐</span><span class="nom-jeu">L'heure</span><span class="desc-jeu">Lis l'horloge !</span></button>
        <button type="button" class="carte-jeu" data-jeu="pairimpair"><span class="emoji-jeu">🟣</span><span class="nom-jeu">Pair ou Impair ?</span><span class="desc-jeu">Range les objets en 2</span></button>
        <button type="button" class="carte-jeu" data-jeu="dizaines"><span class="emoji-jeu">📊</span><span class="nom-jeu">Dizaines &amp; Unités</span><span class="desc-jeu">Barres et points</span></button>
        <button type="button" class="carte-jeu" data-jeu="formes"><span class="emoji-jeu">🔷</span><span class="nom-jeu">Les formes</span><span class="desc-jeu">Cercle, carré, triangle…</span></button>
        <button type="button" class="carte-jeu" data-jeu="monnaiecp"><span class="emoji-jeu">🪙</span><span class="nom-jeu">La monnaie</span><span class="desc-jeu">Pièces et petites sommes</span></button>
        <button type="button" class="carte-jeu" data-jeu="moitie"><span class="emoji-jeu">✂️</span><span class="nom-jeu">La moitié</span><span class="desc-jeu">Partage en 2 parts égales</span></button>

        <button type="button" class="carte-jeu" data-jeu="division"><span class="emoji-jeu">➗</span><span class="nom-jeu">Partage</span><span class="desc-jeu">En groupes égaux</span></button>
        <button type="button" class="carte-jeu" data-jeu="fractions"><span class="emoji-jeu">🍕</span><span class="nom-jeu">Fractions</span><span class="desc-jeu">½ ¼ ¾ de formes</span></button>
        <button type="button" class="carte-jeu" data-jeu="mesures"><span class="emoji-jeu">📏</span><span class="nom-jeu">Mesures</span><span class="desc-jeu">Longueurs et masses</span></button>
        <button type="button" class="carte-jeu" data-jeu="monnaiece1"><span class="emoji-jeu">💶</span><span class="nom-jeu">Monnaie CE1</span><span class="desc-jeu">Totaux &amp; monnaie rendue</span></button>
        <button type="button" class="carte-jeu" data-jeu="symetrie"><span class="emoji-jeu">🪞</span><span class="nom-jeu">Symétrie</span><span class="desc-jeu">Trouve le miroir</span></button>
        <button type="button" class="carte-jeu" data-jeu="syllabes"><span class="emoji-jeu">📖</span><span class="nom-jeu">Syllabes</span><span class="desc-jeu">Complète le mot !</span></button>
        <button type="button" class="carte-jeu" data-jeu="lecture"><span class="emoji-jeu">📚</span><span class="nom-jeu">Lecture</span><span class="desc-jeu">Image et mot qui va avec</span></button>
        <button type="button" class="carte-jeu" data-jeu="anglais"><span class="emoji-jeu">🇬🇧</span><span class="nom-jeu">English</span><span class="desc-jeu">What is this?</span></button>
        <button type="button" class="carte-jeu" data-jeu="traduction"><span class="emoji-jeu">🔤</span><span class="nom-jeu">Traduction</span><span class="desc-jeu">Français → Anglais</span></button>

        <span id="icone-genre-actuel">👧</span>
      </button>

    <section id="ecran-jeu" class="ecran" hidden>
      <button type="button" class="btn-retour" id="btn-retour">← Menu</button>
      <p class="jeu-niveau" id="jeu-niveau-badge" hidden></p>
      <h2 id="jeu-titre" class="jeu-titre"></h2>
      <div id="zone-question" class="zone-question"></div>
      <div id="zone-choix" class="zone-choix"></div>
      <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      <button type="button" class="btn-suivant" id="btn-suivant" hidden>Question suivante →</button>
    </section>

    <div id="confetti" class="confetti" aria-hidden="true"></div>
  </div>
  <script>
(function () {
  "use strict";

  const STORAGE_KEY = "maths-cp-etoiles";
  const STORAGE_NIVEAU = "maths-cp-niveau";
  const STORAGE_GENRE = "maths-cp-genre";
  const NIVEAU = { CP: "cp", CE1: "ce1" };
  const GENRE = { FILLE: "fille", GARCON: "garcon" };

  const ANIMAUX = ["🐱", "🐶", "🐰", "🐻", "🦊", "🐸", "🐥", "🐧", "🦋", "🐝"];

  const elGenre = document.getElementById("ecran-genre");
  const elMenu = document.getElementById("ecran-menu");
  const elJeu = document.getElementById("ecran-jeu");
  const elTotal = document.getElementById("total-etoiles");
  const elBadge = document.getElementById("jeu-niveau-badge");
  const elTitre = document.getElementById("jeu-titre");
  const elQuestion = document.getElementById("zone-question");
  const elChoix = document.getElementById("zone-choix");
  const elFeedback = document.getElementById("feedback");
  const elSuivant = document.getElementById("btn-suivant");
  const btnRetour = document.getElementById("btn-retour");
  const elSousTitre = document.getElementById("sous-titre");
  const elIconeGenre = document.getElementById("icone-genre-actuel");

  let jeuCourant = null;
  let bonneReponse = null;
  let repondu = false;
  let niveauCourant = lireNiveau();
  let genreCourant = lireGenre();

  function lireNiveau() {
    const v = localStorage.getItem(STORAGE_NIVEAU);
    return v === NIVEAU.CE1 ? NIVEAU.CE1 : NIVEAU.CP;
  }

  function sauverNiveau(n) {
    localStorage.setItem(STORAGE_NIVEAU, n);
    niveauCourant = n;
  }

  function estCE1() {
    return niveauCourant === NIVEAU.CE1;
  }

  // ── Genre ────────────────────────────────────────────────────────────────

  function lireGenre() {
    const v = localStorage.getItem(STORAGE_GENRE);
    return v === GENRE.GARCON ? GENRE.GARCON : GENRE.FILLE;
  }

  function sauverGenre(g) {
    localStorage.setItem(STORAGE_GENRE, g);
    genreCourant = g;
  }

  function estFille() {
    return genreCourant === GENRE.FILLE;
  }

  function majGenre() {
    const f = estFille();
    if (elSousTitre) {
      elSousTitre.textContent = f
        ? "Des jeux pour devenir championne en maths !"
        : "Des jeux pour devenir champion en maths !";
    }
    if (elIconeGenre) elIconeGenre.textContent = f ? "👧" : "👦";
  }

  function syncNiveauButtons() {
    document.querySelectorAll(".niveau-btn").forEach((btn) => {
      btn.classList.toggle("actif", btn.dataset.niveau === niveauCourant);
    });
  }

  function majLabelsMenu() {
    const desc = document.getElementById("desc-addition");
    if (desc) desc.textContent = estCE1() ? "Jusqu'à 79" : "Jusqu'à 10";
  }

  function setBadgeVisible(visible) {
    if (!elBadge) return;
    if (visible) {
      elBadge.hidden = false;
      elBadge.textContent = estCE1() ? "Niveau : CE1" : "Niveau : CP";
    } else {
      elBadge.hidden = true;
    }
  }

  function lireEtoiles() {
    const n = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);
    return Number.isFinite(n) && n >= 0 ? n : 0;
  }

  function ajouterEtoiles(n) {
    const t = lireEtoiles() + n;
    localStorage.setItem(STORAGE_KEY, String(t));
    elTotal.textContent = t;
  }

  elTotal.textContent = lireEtoiles();
  syncNiveauButtons();
  majLabelsMenu();

  // ── Démarrage : genre screen ou menu direct ───────────────────────────────
  if (localStorage.getItem(STORAGE_GENRE)) {
    majGenre();
    montrerMenu();
  } else {
    // Écran genre déjà actif dans le HTML, rien à faire
  }

  document.querySelectorAll(".niveau-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const n = btn.dataset.niveau;
      if (n === niveauCourant) return;
      sauverNiveau(n);
      syncNiveauButtons();
      majLabelsMenu();
      if (jeuCourant) {
        setBadgeVisible(true);
        resetFeedback();
        if (lanceurs[jeuCourant]) lanceurs[jeuCourant]();
      }
    });
  });

  function melanger(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function entiersDistincts(min, max, count, exclude) {
    const set = new Set(exclude != null ? [exclude] : []);
    const out = [];
    let guard = 0;
    while (out.length < count && guard++ < 100) {
      const n = min + Math.floor(Math.random() * (max - min + 1));
      if (!set.has(n)) {
        set.add(n);
        out.push(n);
      }
    }
    return out;
  }

  function propositionsAvecBonne(bonne, min, max, nbFausse) {
    if (min > max) {
      const t = min;
      min = max;
      max = t;
    }
    const fausses = entiersDistincts(min, max, nbFausse, bonne);
    return melanger([bonne, ...fausses]);
  }

  function afficherChoix(nombres, handler) {
    elChoix.innerHTML = "";
    nombres.forEach((n) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "btn-choix";
      b.textContent = String(n);
      b.dataset.valeur = String(n);
      b.addEventListener("click", () => handler(Number(b.dataset.valeur), b));
      elChoix.appendChild(b);
    });
  }

  function confetti() {
    const root = document.getElementById("confetti");
    const sym = ["⭐", "✨", "🌟", "💫", "🎉"];
    for (let i = 0; i < 18; i++) {
      const s = document.createElement("span");
      s.textContent = sym[i % sym.length];
      s.style.left = Math.random() * 100 + "%";
      s.style.animationDelay = Math.random() * 0.4 + "s";
      root.appendChild(s);
      setTimeout(() => s.remove(), 2500);
    }
  }

  function messagesOk() {
    return estFille()
      ? [
          "Bravo, championne !",
          "Super ! Tu as réussi !",
          "Génial ! Encore une étoile !",
          "Tu es trop forte !",
          "Parfait ! Continue comme ça !",
          "Incroyable ! Quelle championne !",
        ]
      : [
          "Bravo, champion !",
          "Super ! Tu as réussi !",
          "Génial ! Encore une étoile !",
          "Tu es trop fort !",
          "Parfait ! Continue comme ça !",
          "Incroyable ! Quel champion !",
        ];
  }

  function messagesKo() {
    return [
      "Pas grave, on réessaie !",
      "Presque ! Regarde bien…",
      "Courage, la prochaine c'est la bonne !",
    ];
  }

  function apresReponse(choix, bouton, correct) {
    if (repondu) return;
    repondu = true;
    const boutons = elChoix.querySelectorAll(".btn-choix");
    boutons.forEach((btn) => {
      btn.disabled = true;
      const v = Number(btn.dataset.valeur);
      if (v === correct) btn.classList.add("bonne");
    });
    if (choix !== correct) bouton.classList.add("mauvaise");

    if (choix === correct) {
      const ok = messagesOk();
      elFeedback.textContent = ok[Math.floor(Math.random() * ok.length)];
      elFeedback.className = "feedback ok";
      ajouterEtoiles(1);
      confetti();
    } else {
      const ko = messagesKo();
      elFeedback.textContent = ko[Math.floor(Math.random() * ko.length)];
      elFeedback.className = "feedback non";
    }
    elSuivant.hidden = false;
  }

  function resetFeedback() {
    elFeedback.textContent = "";
    elFeedback.className = "feedback";
    elSuivant.hidden = true;
    repondu = false;
  }

  function lancerCompte() {
    elTitre.textContent = "Compte-moi ça !";
    const n = estCE1()
      ? 10 + Math.floor(Math.random() * 9)
      : 3 + Math.floor(Math.random() * 8);
    const emoji = ANIMAUX[Math.floor(Math.random() * ANIMAUX.length)];
    const ligne = Array(n).fill(emoji).join(" ");
    elQuestion.innerHTML =
      "<p>Combien d'animaux tu vois ?</p>" +
      '<p class="ligne-emojis' +
      (n > 8 ? " petit" : "") +
      '">' +
      ligne +
      "</p>";
    bonneReponse = n;
    const props = estCE1()
      ? propositionsAvecBonne(n, Math.max(6, n - 4), Math.min(22, n + 4), 3)
      : propositionsAvecBonne(n, 1, 12, 3);
    afficherChoix(props, (val, btn) => apresReponse(val, btn, bonneReponse));
  }

  function lancerAddition() {
    elTitre.textContent = "Addition magique";
    let a;
    let b;
    let total;
    let html;

    if (!estCE1()) {
      a = 1 + Math.floor(Math.random() * 9);
      b = 1 + Math.floor(Math.random() * (10 - a));
      total = a + b;
      const e1 = ANIMAUX[Math.floor(Math.random() * ANIMAUX.length)];
      let e2 = ANIMAUX[Math.floor(Math.random() * ANIMAUX.length)];
      if (e2 === e1) e2 = ANIMAUX[(ANIMAUX.indexOf(e1) + 1) % ANIMAUX.length];
      html =
        "<p>Combien en tout ?</p>" +
        '<p class="ligne-emojis">' +
        Array(a).fill(e1).join(" ") +
        " <span style='opacity:.5'>+</span> " +
        Array(b).fill(e2).join(" ") +
        "</p>" +
        '<p class="equation">' +
        a +
        " + " +
        b +
        " = ?</p>";
      const props = propositionsAvecBonne(total, 2, 10, 3);
      elQuestion.innerHTML = html;
      bonneReponse = total;
      afficherChoix(props, (val, btn) => apresReponse(val, btn, bonneReponse));
      return;
    }

    total = 21 + Math.floor(Math.random() * 59);
    a = 1 + Math.floor(Math.random() * (total - 1));
    b = total - a;

    html =
      "<p>Calcul mental — combien font :</p>" +
      '<p class="equation" style="font-size:2rem;margin-top:.75rem">' +
      a +
      " + " +
      b +
      " = ?</p>";

    elQuestion.innerHTML = html;
    bonneReponse = total;
    const pmin = Math.max(2, total - 15);
    const pmax = Math.min(95, total + 15);
    const props = propositionsAvecBonne(total, pmin, pmax, 3);
    afficherChoix(props, (val, btn) => apresReponse(val, btn, bonneReponse));
  }

  function lancerSoustraction() {
    elTitre.textContent = "Les pommes";
    let total;
    let enleve;
    let reste;

    if (!estCE1()) {
      total = 4 + Math.floor(Math.random() * 7);
    } else {
      total = 21 + Math.floor(Math.random() * 69);
    }
    enleve = 1 + Math.floor(Math.random() * (total - 1));
    reste = total - enleve;

    elQuestion.innerHTML =
      "<p>Il y a <strong>" +
      total +
      "</strong> pommes 🍎</p>" +
      "<p>On en mange <strong>" +
      enleve +
      "</strong>. Combien il en reste ?</p>" +
      '<p class="equation">' +
      total +
      " − " +
      enleve +
      " = ?</p>";
    bonneReponse = reste;
    const props = estCE1()
      ? propositionsAvecBonne(reste, Math.max(0, reste - 15), Math.min(89, reste + 15), 3)
      : propositionsAvecBonne(reste, 0, 10, 3);
    afficherChoix(props, (val, btn) => apresReponse(val, btn, bonneReponse));
  }

  function lancerCompare() {
    elTitre.textContent = "Le plus grand";
    let a;
    let b;

    if (!estCE1()) {
      a = 1 + Math.floor(Math.random() * 20);
      b = 1 + Math.floor(Math.random() * 20);
    } else {
      a = 100 + Math.floor(Math.random() * 900);
      b = 100 + Math.floor(Math.random() * 900);
    }
    if (a === b) b = b < 999 ? b + 1 : b - 1;
    bonneReponse = Math.max(a, b);
    elQuestion.innerHTML =
      "<p>Quel nombre est le <strong>plus grand</strong> ?</p>" +
      '<p class="equation" style="font-size:clamp(1.35rem,6vw,1.85rem)">' +
      a +
      " &nbsp; ou &nbsp; " +
      b +
      "</p>";
    afficherChoix(melanger([a, b]), (val, btn) => apresReponse(val, btn, bonneReponse));
  }

  function lancerSuite() {
    elTitre.textContent = "Numéro manquant";
    let debut, step;
    if (!estCE1()) {
      debut = 1 + Math.floor(Math.random() * 12);
      step = 1;
    } else {
      step = [1, 2, 5, 10][Math.floor(Math.random() * 4)];
      debut = 1 + Math.floor(Math.random() * Math.max(1, 95 - step * 4));
    }
    const suite = [debut, debut + step, debut + step * 2, debut + step * 3, debut + step * 4];
    const indexCache = 1 + Math.floor(Math.random() * 3);
    bonneReponse = suite[indexCache];
    const affiche = suite.map((n, i) => (i === indexCache ? "?" : String(n)));
    elQuestion.innerHTML =
      "<p>Quel nombre manque dans la suite ?</p>" +
      '<p class="suite">' +
      affiche.join(" — ") +
      "</p>";
    const min = Math.max(1, bonneReponse - step * 3);
    const max = bonneReponse + step * 3;
    const props = propositionsAvecBonne(bonneReponse, min, max, 3);
    afficherChoix(props, (val, btn) => apresReponse(val, btn, bonneReponse));
  }

  function lancerDoubles() {
    elTitre.textContent = "Doubles";
    const n = estCE1() ? 10 + Math.floor(Math.random() * 16) : 1 + Math.floor(Math.random() * 5);
    const d = n + n;
    elQuestion.innerHTML =
      "<p>Le double de <strong>" +
      n +
      "</strong>, c'est combien ?</p>" +
      '<p class="equation">' +
      n +
      " + " +
      n +
      " = ?</p>";
    bonneReponse = d;
    const props = estCE1()
      ? propositionsAvecBonne(d, Math.max(10, d - 12), Math.min(60, d + 12), 3)
      : propositionsAvecBonne(d, 2, 12, 3);
    afficherChoix(props, (val, btn) => apresReponse(val, btn, bonneReponse));
  }

  // ── Horloge analogique SVG ────────────────────────────────────────────────

  function svgHorloge(heure, minute, taille) {
    const cx = taille / 2;
    const cy = taille / 2;
    const r = taille / 2 - 3;
    const rad = (d) => (d * Math.PI) / 180;

    // Angles : 0° = 3h (SVG), on soustrait 90° pour démarrer à 12h
    const angleM = rad((minute / 60) * 360 - 90);
    const angleH = rad((((heure % 12) + minute / 60) / 12) * 360 - 90);

    const lonM = r * 0.72;
    const lonH = r * 0.50;

    const mX = (cx + lonM * Math.cos(angleM)).toFixed(2);
    const mY = (cy + lonM * Math.sin(angleM)).toFixed(2);
    const hX = (cx + lonH * Math.cos(angleH)).toFixed(2);
    const hY = (cy + lonH * Math.sin(angleH)).toFixed(2);

    // 12 graduations
    let ticks = "";
    for (let i = 0; i < 12; i++) {
      const a = rad(i * 30 - 90);
      const major = i % 3 === 0;
      const r1 = r - (major ? Math.round(taille * 0.09) : Math.round(taille * 0.055));
      const r2 = r - 2;
      const x1 = (cx + r1 * Math.cos(a)).toFixed(2);
      const y1 = (cy + r1 * Math.sin(a)).toFixed(2);
      const x2 = (cx + r2 * Math.cos(a)).toFixed(2);
      const y2 = (cy + r2 * Math.sin(a)).toFixed(2);
      const sw = major ? (taille > 100 ? 3 : 2) : (taille > 100 ? 1.5 : 1);
      const col = major ? "#6c5ce7" : "#c4b5f9";
      ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`;
    }

    const swM = taille > 100 ? 3.5 : 2;
    const swH = taille > 100 ? 5.5 : 3.5;
    const dotR = taille > 100 ? 5.5 : 3.5;
    const bw = taille > 100 ? 3 : 2;

    return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}" xmlns="http://www.w3.org/2000/svg">
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="white" stroke="#6c5ce7" stroke-width="${bw}"/>
  ${ticks}
  <line x1="${cx}" y1="${cy}" x2="${mX}" y2="${mY}" stroke="#00cec9" stroke-width="${swM}" stroke-linecap="round"/>
  <line x1="${cx}" y1="${cy}" x2="${hX}" y2="${hY}" stroke="#5344c7" stroke-width="${swH}" stroke-linecap="round"/>
  <circle cx="${cx}" cy="${cy}" r="${dotR}" fill="#5344c7"/>
</svg>`;
  }

  function afficherChoixHorloge(options) {
    elChoix.innerHTML = "";
    options.forEach((totalMin) => {
      const h = Math.floor(totalMin / 60) || 12;
      const m = totalMin % 60;
      const b = document.createElement("button");
      b.type = "button";
      b.className = "btn-choix";
      b.textContent = labelHeure(totalMin);
      b.dataset.valeur = String(totalMin);
      b.addEventListener("click", () => apresReponse(totalMin, b, bonneReponse));
      elChoix.appendChild(b);
    });
  }

  function labelHeure(totalMin) {
    const h = Math.floor(totalMin / 60) || 12;
    const m = totalMin % 60;
    if (m === 0) return String(h);
    return h + "h" + String(m).padStart(2, "0");
  }

  function lancerHeure() {
    elTitre.textContent = "🕐";

    // CP : multiples de 5 min ; CE1 : n'importe quelle minute
    const pas = estCE1() ? 1 : 5;
    const pool = [];
    for (let h = 1; h <= 12; h++) {
      for (let m = 0; m < 60; m += pas) {
        pool.push(h * 60 + m);
      }
    }

    const bonne = pool[Math.floor(Math.random() * pool.length)];
    const bonneH = Math.floor(bonne / 60);
    const bonneM = bonne % 60;

    // Distracteurs : même heure avec minutes différentes OU heures différentes
    // Pour rendre intéressant : 2 distracteurs même heure (minutes diff), 1 heure diff
    const memHeure = pool.filter((t) => Math.floor(t / 60) === bonneH && t !== bonne);
    const autreHeure = pool.filter((t) => Math.floor(t / 60) !== bonneH);

    const distMemH = melanger(memHeure).slice(0, 2);
    const distAutreH = melanger(autreHeure).slice(0, 1);
    const fausses = melanger([...distMemH, ...distAutreH]).slice(0, 3);
    const options = melanger([bonne, ...fausses]);

    bonneReponse = bonne;

    elQuestion.innerHTML = `<div class="grande-horloge">${svgHorloge(bonneH || 12, bonneM, 160)}</div>`;
    afficherChoixHorloge(options);
  }

  // ── Pair / Impair ────────────────────────────────────────────────────────

  function svgPairesIcon(pair) {
    const n = pair ? 4 : 5;
    let circles = "";
    for (let i = 0; i < n; i++) {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const color = col === 0 ? "#6c5ce7" : "#fd79a8";
      circles += `<circle cx="${20 + col * 30}" cy="${18 + row * 30}" r="11" fill="${color}" opacity="0.9"/>`;
    }
    const h = 18 + Math.ceil(n / 2) * 30;
    return `<svg width="70" height="${h}" viewBox="0 0 70 ${h}">${circles}</svg>`;
  }

  function lancerPairImpair() {

  // ── Formes géométriques ──────────────────────────────────────────────────

  const FORMES = ["cercle", "carré", "rectangle", "triangle", "losange"];
  const COULEURS_FORMES = ["#6c5ce7", "#00cec9", "#fd79a8", "#fdcb6e", "#00b894", "#e17055"];

  function svgForme(type, taille, couleur) {
    const cx = taille / 2, cy = taille / 2, r = taille * 0.38;
    switch (type) {
      case "cercle":
        return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${couleur}"/></svg>`;
      case "carré": {
        const s = r * 1.55;
        return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}"><rect x="${cx - s / 2}" y="${cy - s / 2}" width="${s}" height="${s}" rx="4" fill="${couleur}"/></svg>`;
      }
      case "rectangle": {
        const rw = r * 2, rh = r * 1.1;
        return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}"><rect x="${cx - rw / 2}" y="${cy - rh / 2}" width="${rw}" height="${rh}" rx="4" fill="${couleur}"/></svg>`;
      }
      case "triangle": {
        const pts = `${cx},${cy - r} ${cx - r * 0.95},${cy + r * 0.6} ${cx + r * 0.95},${cy + r * 0.6}`;
        return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}"><polygon points="${pts}" fill="${couleur}"/></svg>`;
      }
      case "losange": {
        const pts = `${cx},${cy - r} ${cx + r * 0.72},${cy} ${cx},${cy + r} ${cx - r * 0.72},${cy}`;
        return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}"><polygon points="${pts}" fill="${couleur}"/></svg>`;
      }
      default: return "";
    }
  }

    bonneReponse = idx;

    elQuestion.innerHTML = `<div class="forme-question">${svgForme(forme, 130, couleurQ)}</div>`;

    const autresIdx = melanger(FORMES.map((_, i) => i).filter((i) => i !== idx)).slice(0, 3);
    const optionsIdx = melanger([idx, ...autresIdx]);

  function labelCents(v) {
    if (v === 0) return "0€";
    return v % 100 === 0 ? `${v / 100}€` : `${v}c`;
  }

  function labelEuros(v) {
    if (v === 0) return "0€";
    if (v % 100 === 0) return `${v / 100}€`;
    const euros = Math.floor(v / 100);
    const cents = String(v % 100).padStart(2, "0");
    return euros > 0 ? `${euros},${cents}€` : `0,${cents}€`;
  }

  // ── Tables de multiplication ────────────────────────────────────────────

  function lancerMultiplication() {
    elTitre.textContent = "✖️";
    const tables = estCE1() ? [2, 3, 4, 5, 10] : [2, 3, 5];
    const mult = tables[Math.floor(Math.random() * tables.length)];

      // Dots grid for larger products
      for (let g = 0; g < fact; g++) {
        let dotsSvg = "";

          dotsSvg += `<circle cx="${12 + (d % 5) * 18}" cy="${12 + Math.floor(d / 5) * 18}" r="7" fill="#6c5ce7"/>`;
        }
        const dw = Math.min(mult, 5) * 18 + 6;

  // ── Fractions ────────────────────────────────────────────────────────────

  function svgFraction(num, denom, taille) {
    const cx = taille / 2, cy = taille / 2, r = taille * 0.42;
    const angleOffset = -Math.PI / 2;
    let parts = "";
    for (let i = 0; i < denom; i++) {
      const a1 = (i / denom) * 2 * Math.PI + angleOffset;
      const a2 = ((i + 1) / denom) * 2 * Math.PI + angleOffset;
      const x1 = (cx + r * Math.cos(a1)).toFixed(2);
      const y1 = (cy + r * Math.sin(a1)).toFixed(2);
      const x2 = (cx + r * Math.cos(a2)).toFixed(2);
      const y2 = (cy + r * Math.sin(a2)).toFixed(2);
      const fill = i < num ? "#6c5ce7" : "#e8e0ff";
      const la = 1 / denom > 0.5 ? 1 : 0;
      parts += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${la} 1 ${x2},${y2} Z" fill="${fill}" stroke="white" stroke-width="2"/>`;
    }
    return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}">
      ${parts}
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#6c5ce7" stroke-width="2"/>
    </svg>`;
  }

  function lancerFractions() {
    elTitre.textContent = "🍕";
    const pool = estCE1()
      ? [{ n: 1, d: 2 }, { n: 1, d: 4 }, { n: 3, d: 4 }, { n: 1, d: 3 }, { n: 2, d: 3 }]
      : [{ n: 1, d: 2 }, { n: 1, d: 4 }, { n: 3, d: 4 }];
    const bonne = pool[Math.floor(Math.random() * pool.length)];
    bonneReponse = bonne.n * 10 + bonne.d;

    elQuestion.innerHTML = `<div class="fraction-question">${svgFraction(bonne.n, bonne.d, 140)}</div>`;

    const fausses = melanger(pool.filter((f) => f.n !== bonne.n || f.d !== bonne.d)).slice(0, 3);
    // Pad with extra if not enough distinct options
    while (fausses.length < 3) {
      const extras = [{ n: 2, d: 4 }, { n: 1, d: 6 }, { n: 2, d: 6 }];
      const e = extras.find((x) => (x.n * 10 + x.d) !== bonneReponse && !fausses.find((f) => f.n === x.n && f.d === x.d));
      if (e) fausses.push(e); else break;
    }
    const options = melanger([bonne, ...fausses.slice(0, 3)]);

    elChoix.innerHTML = "";
    options.forEach((f) => {
      const val = f.n * 10 + f.d;
      const b = document.createElement("button");
      b.type = "button";
      b.className = "btn-choix btn-forme";
      b.innerHTML = svgFraction(f.n, f.d, 75);
      b.dataset.valeur = String(val);
      b.addEventListener("click", () => apresReponse(val, b, bonneReponse));
      elChoix.appendChild(b);
    });
  }

  // ── Symétrie ────────────────────────────────────────────────────────────

  function svgDemiFigure(type, taille, gauche) {
    const cx = taille / 2, cy = taille / 2, r = taille * 0.38;
    const g = gauche ? -1 : 1;
    let shape = "";
    if (type === 0) {
      // Demi-étoile
      const pts = [];
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * 2 * Math.PI - Math.PI / 2;
        pts.push(`${(cx + r * Math.cos(a) * g).toFixed(2)},${(cy + r * Math.sin(a)).toFixed(2)}`);
        const a2 = a + Math.PI / 5;
        pts.push(`${(cx + r * 0.42 * Math.cos(a2) * g).toFixed(2)},${(cy + r * 0.42 * Math.sin(a2)).toFixed(2)}`);
      }
      shape = `<polygon points="${pts.join(" ")}" fill="#fdcb6e"/>`;
    } else if (type === 1) {
      // Demi-maison
      const bx = cx - r * 0.7 * g, bw = r * 1.4;
      shape = `<rect x="${Math.min(cx, cx - r * 0.7 * g)}" y="${cy}" width="${bw}" height="${r * 0.85}" fill="#00cec9"/>
        <polygon points="${cx},${cy - r * 0.6} ${cx - r * 0.8 * g},${cy} ${cx + r * 0.8 * g},${cy}" fill="#fd79a8"/>`;
    } else {
      // Demi-papillon
      const pts1 = `${cx},${cy} ${cx + r * 0.85 * g},${cy - r * 0.65} ${cx + r * 0.4 * g},${cy + r * 0.3}`;
      const pts2 = `${cx},${cy} ${cx + r * 0.85 * g},${cy + r * 0.65} ${cx + r * 0.4 * g},${cy - r * 0.3}`;
      shape = `<polygon points="${pts1}" fill="#6c5ce7" opacity="0.85"/>
        <polygon points="${pts2}" fill="#fd79a8" opacity="0.85"/>`;
    }
    return `<svg width="${taille}" height="${taille}" viewBox="0 0 ${taille} ${taille}">
      <line x1="${cx}" y1="4" x2="${cx}" y2="${taille - 4}" stroke="#c4b5f9" stroke-width="2" stroke-dasharray="5,3"/>
      ${shape}
    </svg>`;
  }

    elTitre.textContent = "📖 Syllabes";

    const indexCache = Math.floor(Math.random() * parties.length);
    const syllabeCachee = parties[indexCache];

    const affiche = parties.map((s, i) =>
      i === indexCache
        ? `<span style="color:var(--rose);border-bottom:3px solid var(--rose);padding:0 2px;min-width:2ch;display:inline-block">___</span>`

    ).join('<span style="opacity:0.4;margin:0 1px">·</span>');

      `<p style="font-size:1.7rem;font-weight:700;color:var(--primaire);letter-spacing:0.04em;margin-top:0.5rem">${affiche}</p>`;

    const toutesListes = [...MOTS_SYLLABES_CP, ...MOTS_SYLLABES_CE1];
    const piscine = toutesListes.flatMap((m) => m.parties).filter((s) => s !== syllabeCachee);
    const distracteurs = melanger(piscine).slice(0, 3);
    const options = melanger([syllabeCachee, ...distracteurs]);
    bonneReponse = options.indexOf(syllabeCachee);

      b.type = "button";
      b.className = "btn-choix";
      b.textContent = syl;
